<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一代宗師 / The Grandmaster — Script</title>
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc82;
    --gold-dim: #7a6430;
    --ink: #0e0e0e;
    --paper: #e4ddd0;
    --muted: #5a554a;
    --dim: #333;
    --border: #1e1e1e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Georgia', 'Noto Serif SC', serif;
    background: var(--ink);
    color: var(--paper);
  }

  /* ─── App shell ─── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ─── Top bar ─── */
  .top-bar {
    display: grid;
    grid-template-columns: 200px 1fr 200px;
    align-items: center;
    height: 72px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding: 0 1.5rem;
    gap: 1rem;
  }

  .top-left {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .chapter-tag {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .top-year-loc {
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.08em;
  }

  .top-venue {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .top-center {
    text-align: center;
  }

  .scene-title-zh {
    font-size: 1.6rem;
    color: var(--gold);
    font-weight: normal;
    letter-spacing: 0.06em;
    line-height: 1.1;
  }

  .scene-title-en {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.03em;
    margin-top: 0.2rem;
  }

  .top-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.5rem;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .top-nav-btn {
    background: none;
    border: none;
    color: var(--gold);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0.2rem 0.3rem;
    transition: color 0.15s;
    font-family: inherit;
  }
  .top-nav-btn:hover { color: var(--gold-light); }
  .top-nav-btn:disabled { color: var(--dim); cursor: default; }

  .top-nav-sep { color: var(--dim); }

  .top-nav-label {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.04em;
  }

  /* ─── Layout ─── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Year nav ─── */
  .year-nav {
    width: 62px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 0;
    overflow-y: auto;
    gap: 0;
  }

  .year-nav::-webkit-scrollbar { display: none; }

  .year-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .year-nav-rule {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 auto;
  }

  .year-nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.72rem;
    color: #3a3a3a;
    letter-spacing: 0.04em;
    padding: 0.35rem 0;
    width: 100%;
    text-align: center;
    transition: color 0.2s;
    position: relative;
  }

  .year-nav-btn:hover { color: var(--gold-light); }

  .year-nav-btn.active {
    color: var(--gold);
  }

  .year-nav-btn.active::after {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--gold);
    margin: 3px auto 0;
  }

  /* ─── Reading area ─── */
  .reading-area {
    flex: 1;
    overflow-y: auto;
    padding: 2rem 3.5rem 4rem;
  }

  .reading-area::-webkit-scrollbar { width: 4px; }
  .reading-area::-webkit-scrollbar-track { background: transparent; }
  .reading-area::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  /* ─── Scene header ─── */
  .scene-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.75rem;
  }

  .sc-label {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .sc-loc {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .scene-rule {
    border: none;
    border-top: 1px solid #1c1c1c;
    margin-bottom: 2rem;
  }

  /* ─── Lines ─── */
  .line {
    margin-bottom: 1.6rem;
  }

  .speaker {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--gold-dim);
    margin-bottom: 0.35rem;
  }

  .zh {
    font-size: 1.1rem;
    line-height: 1.75;
    color: #ccc8be;
    margin-bottom: 0.25rem;
  }

  .zh .term-highlight {
    color: var(--gold);
    text-decoration: underline;
    text-decoration-color: var(--gold-dim);
    text-underline-offset: 3px;
    cursor: default;
  }

  .en {
    font-size: 0.84rem;
    line-height: 1.65;
    color: #585248;
    font-style: italic;
  }

  /* ─── Annotated line ─── */
  .line.annotated {
    border-left: 2px solid var(--gold-dim);
    padding: 0.9rem 1.2rem;
    background: #121008;
    border-radius: 0 3px 3px 0;
    margin-left: -1.4rem;
  }

  .line.annotated .zh { color: #ddd8cc; }

  .annotation-toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.7rem;
    background: none;
    border: 1px solid var(--gold-dim);
    border-radius: 3px;
    color: var(--gold);
    font-size: 0.68rem;
    padding: 0.15rem 0.6rem;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s;
  }
  .annotation-toggle:hover { background: #1a1710; border-color: var(--gold); }
  .annotation-toggle.showing { background: #1a1710; border-color: var(--gold); color: var(--gold-light); }

  /* ─── Notes panel ─── */
  .notes-panel {
    width: 310px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .notes-panel-inner {
    height: 100%;
    overflow-y: auto;
    padding: 1.5rem 1.8rem;
    position: relative;
    z-index: 1;
  }

  .notes-panel-inner::-webkit-scrollbar { display: none; }

  .notes-panel-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #252525;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }

  .notes-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.6rem;
  }

  .notes-tag {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .notes-count {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .notes-rule {
    border: none;
    border-top: 1px solid #1c1c1c;
    margin-bottom: 1.2rem;
  }

  .notes-scene-ref {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.9rem;
  }

  .notes-headline {
    font-size: 1.15rem;
    color: var(--gold);
    font-style: italic;
    line-height: 1.35;
    margin-bottom: 1.3rem;
    letter-spacing: 0.01em;
  }

  .notes-explanation p {
    font-size: 0.79rem;
    line-height: 1.8;
    color: #6a6358;
    margin-bottom: 0.9rem;
  }
  .notes-explanation p:last-child { margin-bottom: 0; }

  .notes-terms {
    margin-top: 1.3rem;
    padding-top: 1.1rem;
    border-top: 1px solid #1c1c1c;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .notes-term {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 0.6rem;
    align-items: start;
  }

  .nt-left { display: flex; flex-direction: column; gap: 0.15rem; }
  .nt-zh { font-size: 0.88rem; color: var(--gold); letter-spacing: 0.04em; }
  .nt-pinyin { font-size: 0.68rem; color: var(--gold-dim); font-style: italic; letter-spacing: 0.03em; }
  .nt-meaning { font-size: 0.72rem; color: #5a554a; line-height: 1.5; }

  .notes-watermark {
    position: absolute;
    bottom: 1.5rem;
    right: 1.8rem;
    font-size: 7rem;
    color: #161410;
    pointer-events: none;
    line-height: 1;
    user-select: none;
    font-weight: normal;
    z-index: 0;
  }

  /* ─── Bottom bar ─── */
  .bottom-bar {
    height: 44px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: grid;
    grid-template-columns: 80px 1fr 80px;
    align-items: center;
    padding: 0 1.5rem;
    gap: 1rem;
  }

  .bottom-counter {
    font-size: 0.65rem;
    color: #2e2e2e;
    letter-spacing: 0.08em;
  }

  .bottom-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.9rem;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .bottom-nav-btn {
    background: none;
    border: none;
    color: var(--gold-dim);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.78rem;
    padding: 0.1rem;
    transition: color 0.15s;
  }
  .bottom-nav-btn:hover { color: var(--gold-light); }
  .bottom-nav-btn:disabled { color: #252525; cursor: default; }

  .bottom-nav-scene {
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s;
  }
  .bottom-nav-scene:hover { color: var(--gold-light); }

  .bottom-note-info {
    color: #2e2e2e;
    letter-spacing: 0.06em;
  }

  .bottom-sep { color: #252525; }
</style>
</head>
<body>

<div class="app">

  <!-- Top bar -->
  <header class="top-bar">
    <div class="top-left">
      <div class="chapter-tag" id="chapter-tag">章·Ch·I</div>
      <div class="top-year-loc" id="top-year-loc">—</div>
    </div>
    <div class="top-center">
      <h1 class="scene-title-zh" id="scene-title-zh">—</h1>
      <p class="scene-title-en" id="scene-title-en"></p>
    </div>
    <div class="top-right">
      <button class="top-nav-btn" id="top-prev">«</button>
      <span class="top-nav-label" id="top-prev-label"></span>
      <span class="top-nav-sep">·</span>
      <span class="top-nav-label" id="top-next-label"></span>
      <button class="top-nav-btn" id="top-next">»</button>
    </div>
  </header>

  <div class="layout">

    <!-- Year nav -->
    <nav class="year-nav" id="year-nav"></nav>

    <!-- Reading area -->
    <main class="reading-area">
      <div class="scene-header">
        <span class="sc-label" id="sc-label">SC —</span>
        <span class="sc-loc" id="sc-loc"></span>
      </div>
      <hr class="scene-rule">
      <div id="lines-container"></div>
    </main>

    <!-- Notes panel -->
    <aside class="notes-panel" id="notes-panel">
      <div class="notes-panel-inner">
        <div class="notes-panel-empty" id="notes-empty">— 解 —</div>
        <div id="notes-content" style="display:none">
          <div class="notes-top">
            <span class="notes-tag">NOTE 解</span>
            <span class="notes-count" id="notes-count"></span>
          </div>
          <hr class="notes-rule">
          <div class="notes-scene-ref" id="notes-scene-ref"></div>
          <div class="notes-headline" id="notes-headline"></div>
          <div class="notes-explanation" id="notes-explanation"></div>
          <div class="notes-terms" id="notes-terms"></div>
        </div>
      </div>
      <div class="notes-watermark" id="notes-watermark"></div>
    </aside>

  </div>

  <!-- Bottom bar -->
  <footer class="bottom-bar">
    <span class="bottom-counter" id="bottom-counter">1/1</span>
    <nav class="bottom-nav">
      <button class="bottom-nav-btn" id="bot-prev">«</button>
      <span class="bottom-nav-scene" id="bot-prev-label"></span>
      <span class="bottom-sep">·</span>
      <span class="bottom-note-info" id="bot-note-info">⌘ K TO SEARCH</span>
      <span class="bottom-sep">·</span>
      <span class="bottom-nav-scene" id="bot-next-label"></span>
      <button class="bottom-nav-btn" id="bot-next">»</button>
    </nav>
    <span></span>
  </footer>

</div>

<script>
fetch('script.json').then(r => r.json()).then(init);

function init(data) {
  const raw = data.scenes;

  // Only show positive scene numbers, in array order
  const scenes = raw.filter(s => s.scene > 0);

  // Build global annotation index: [{sceneIdx, lineIdx, sceneNum, speaker, annotation}]
  const allAnnotations = [];
  scenes.forEach((scene, si) => {
    scene.lines.forEach((line, li) => {
      if (line.annotation) {
        allAnnotations.push({ si, li, sceneNum: scene.scene, speaker: line.speaker, annotation: line.annotation });
      }
    });
  });

  // Collect unique years for year nav
  const years = [...new Set(scenes.map(s => s.year).filter(Boolean))].sort((a, b) => a - b);

  // Build year nav
  const yearNav = document.getElementById('year-nav');
  years.forEach((y, i) => {
    if (i > 0) {
      const rule = document.createElement('div');
      rule.className = 'year-nav-rule';
      yearNav.appendChild(rule);
    }
    const item = document.createElement('div');
    item.className = 'year-nav-item';
    const btn = document.createElement('button');
    btn.className = 'year-nav-btn';
    btn.dataset.year = y;
    btn.textContent = y;
    btn.addEventListener('click', () => {
      const idx = scenes.findIndex(s => s.year == y);
      if (idx >= 0) showScene(idx);
    });
    item.appendChild(btn);
    yearNav.appendChild(item);
  });

  // Chapter derivation from year
  function getChapter(year) {
    if (!year || year <= 1906) return 'I';
    if (year <= 1939) return 'II';
    if (year <= 1949) return 'III';
    return 'IV';
  }

  // Highlight key terms in zh text
  function highlightTerms(zh, keyTerms) {
    if (!keyTerms || !keyTerms.length) return escHtml(zh);
    let result = escHtml(zh);
    keyTerms.forEach(t => {
      const safeZh = escHtml(t.zh);
      result = result.split(safeZh).join(
        `<span class="term-highlight" title="${escHtml(t.pinyin)}: ${escHtml(t.meaning)}">${safeZh}</span>`
      );
    });
    return result;
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Speaker display: short form after /
  function shortSpeaker(speaker) {
    if (!speaker) return '';
    return speaker;
  }

  // State
  let currentIdx = 0;

  function showScene(idx) {
    currentIdx = Math.max(0, Math.min(idx, scenes.length - 1));
    renderScene();
  }

  function renderScene() {
    const scene = scenes[currentIdx];
    const prev = currentIdx > 0 ? scenes[currentIdx - 1] : null;
    const next = currentIdx < scenes.length - 1 ? scenes[currentIdx + 1] : null;

    const chapter = getChapter(scene.year);
    const yearLoc = [scene.year, scene.location].filter(Boolean).join(' · ') || '—';

    // Scene title: use explicit title fields if available, else location / notes
    const titleZh = scene.title_zh || scene.location || `SC ${scene.scene}`;
    const titleEn = scene.title_en || scene.notes || '';

    // Top bar
    document.getElementById('chapter-tag').textContent = `章·Ch·${chapter}`;
    document.getElementById('top-year-loc').textContent = yearLoc;
    document.getElementById('scene-title-zh').textContent = titleZh;
    document.getElementById('scene-title-en').textContent = titleEn;

    // Top nav labels
    const prevLabel = prev ? `SC ${prev.scene}` : '';
    const nextLabel = next ? `SC ${next.scene}` : '';
    document.getElementById('top-prev-label').textContent = prevLabel;
    document.getElementById('top-next-label').textContent = nextLabel;
    document.getElementById('top-prev').disabled = !prev;
    document.getElementById('top-next').disabled = !next;
    document.querySelector('.top-nav-sep').style.visibility = (prev && next) ? '' : 'hidden';

    // Scene header
    document.getElementById('sc-label').textContent = `SC ${scene.scene}`;
    document.getElementById('sc-loc').textContent = yearLoc;

    // Year nav highlight
    document.querySelectorAll('.year-nav-btn').forEach(btn => {
      btn.classList.toggle('active', scene.year && btn.dataset.year == scene.year);
    });

    // Lines
    const container = document.getElementById('lines-container');
    container.innerHTML = '';

    // Find the annotation for this scene (if any) — use first one
    const sceneAnnotations = allAnnotations.filter(a => a.si === currentIdx);

    scene.lines.forEach((line, li) => {
      const hasAnn = !!line.annotation;
      const div = document.createElement('div');
      div.className = 'line' + (hasAnn ? ' annotated' : '');

      const spk = line.speaker
        ? `<div class="speaker">${escHtml(shortSpeaker(line.speaker))}</div>`
        : '';

      const zhHtml = hasAnn
        ? highlightTerms(line.zh, line.annotation.key_terms)
        : escHtml(line.zh);

      if (hasAnn) {
        div.innerHTML = `
          ${spk}
          <div class="zh">${zhHtml}</div>
          <div class="en">${escHtml(line.en)}</div>
          <button class="annotation-toggle showing">解 <span style="font-size:0.6rem;letter-spacing:0.14em">SHOWING</span></button>
        `;
        // When annotation toggle is clicked, scroll right panel to this note
        div.querySelector('.annotation-toggle').addEventListener('click', () => {
          showAnnotationInPanel(line.annotation, scene.scene, line.speaker, sceneAnnotations[0]);
        });
      } else {
        div.innerHTML = `${spk}<div class="zh">${zhHtml}</div><div class="en">${escHtml(line.en)}</div>`;
      }

      container.appendChild(div);
    });

    // Right panel
    if (sceneAnnotations.length > 0) {
      const a = sceneAnnotations[0];
      showAnnotationInPanel(scenes[a.si].lines[a.li].annotation, a.sceneNum, a.speaker, a);
    } else {
      document.getElementById('notes-empty').style.display = '';
      document.getElementById('notes-content').style.display = 'none';
    }

    // Bottom bar
    document.getElementById('bottom-counter').textContent = `${currentIdx + 1}/${scenes.length}`;

    const botPrev = document.getElementById('bot-prev-label');
    const botNext = document.getElementById('bot-next-label');
    botPrev.textContent = prev ? `SC ${prev.scene}` : '';
    botNext.textContent = next ? `SC ${next.scene}` : '';
    botPrev.onclick = prev ? () => showScene(currentIdx - 1) : null;
    botNext.onclick = next ? () => showScene(currentIdx + 1) : null;
    document.getElementById('bot-prev').disabled = !prev;
    document.getElementById('bot-next').disabled = !next;

    const noteCount = sceneAnnotations.length;
    document.getElementById('bot-note-info').textContent =
      noteCount > 0 ? `${noteCount} NOTE${noteCount > 1 ? 'S' : ''} IN VIEW · ⌘ K TO SEARCH` : '⌘ K TO SEARCH';

    // Scroll reading area to top
    document.querySelector('.reading-area').scrollTop = 0;
  }

  function showAnnotationInPanel(ann, sceneNum, speaker, annotationRef) {
    document.getElementById('notes-empty').style.display = 'none';
    document.getElementById('notes-content').style.display = '';

    // Global annotation number
    const globalIdx = allAnnotations.findIndex(a => a.si === annotationRef?.si && a.li === annotationRef?.li);
    const countText = globalIdx >= 0
      ? `${String(globalIdx + 1).padStart(2, '0')} / ${String(allAnnotations.length).padStart(2, '0')}`
      : '';
    document.getElementById('notes-count').textContent = countText;

    document.getElementById('notes-scene-ref').textContent =
      `SC ${sceneNum}${speaker ? ' · ' + speaker : ''}`;

    document.getElementById('notes-headline').textContent = ann.headline || '';

    const paras = (ann.explanation || '').split('\n\n').map(p => `<p>${escHtml(p)}</p>`).join('');
    document.getElementById('notes-explanation').innerHTML = paras;

    const terms = (ann.key_terms || []);
    document.getElementById('notes-terms').innerHTML = terms.map(t => `
      <div class="notes-term">
        <div class="nt-left">
          <span class="nt-zh">${escHtml(t.zh)}</span>
          <span class="nt-pinyin">${escHtml(t.pinyin)}</span>
        </div>
        <span class="nt-meaning">${escHtml(t.meaning)}</span>
      </div>
    `).join('');

    // Watermark: last character of first key term's zh
    const watermark = terms.length > 0 ? terms[0].zh.slice(-1) : '';
    document.getElementById('notes-watermark').textContent = watermark;
  }

  // Nav buttons
  document.getElementById('top-prev').addEventListener('click', () => showScene(currentIdx - 1));
  document.getElementById('top-next').addEventListener('click', () => showScene(currentIdx + 1));
  document.getElementById('bot-prev').addEventListener('click', () => showScene(currentIdx - 1));
  document.getElementById('bot-next').addEventListener('click', () => showScene(currentIdx + 1));

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') showScene(currentIdx - 1);
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') showScene(currentIdx + 1);
  });

  // Initial render — try to start at scene 19 for demonstration
  const startIdx = scenes.findIndex(s => s.scene === 19);
  showScene(startIdx >= 0 ? startIdx : 0);
}
</script>
</body>
</html>
