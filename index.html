<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一代宗師 / The Grandmaster — Script</title>
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc82;
    --gold-dim: #7a6430;
    --ink: #0e0e0e;
    --paper: #e4ddd0;
    --muted: #5a554a;
    --dim: #333;
    --border: #1e1e1e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Georgia', 'Noto Serif SC', serif;
    background: var(--ink);
    color: var(--paper);
  }

  /* ─── App shell ─── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ─── Top bar ─── */
  .top-bar {
    display: grid;
    grid-template-columns: 200px 1fr 200px;
    align-items: center;
    height: 72px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding: 0 1.5rem;
    gap: 1rem;
  }

  .top-left {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .chapter-tag {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .top-year-loc {
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.08em;
  }

  .top-center {
    text-align: center;
  }

  .scene-title-zh {
    font-size: 1.6rem;
    color: var(--gold);
    font-weight: normal;
    letter-spacing: 0.06em;
    line-height: 1.1;
  }

  .scene-title-en {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.03em;
    margin-top: 0.2rem;
  }

  /* ─── Layout ─── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Year nav ─── */
  .year-nav {
    width: 62px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 0;
    overflow-y: auto;
    gap: 0;
  }

  .year-nav::-webkit-scrollbar { display: none; }

  .year-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .year-nav-rule {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 auto;
  }

  .year-nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.72rem;
    color: #3a3a3a;
    letter-spacing: 0.04em;
    padding: 0.35rem 0;
    width: 100%;
    text-align: center;
    transition: color 0.2s;
    position: relative;
  }

  .year-nav-btn:hover { color: var(--gold-light); }

  .year-nav-btn.active {
    color: var(--gold);
  }

  .year-nav-btn.active::after {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--gold);
    margin: 3px auto 0;
  }

  /* ─── Reading area ─── */
  .reading-area {
    flex: 1;
    overflow-y: auto;
    padding: 2rem 3.5rem 4rem;
  }

  .reading-area::-webkit-scrollbar { width: 4px; }
  .reading-area::-webkit-scrollbar-track { background: transparent; }
  .reading-area::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  /* ─── Scene header ─── */
  .scene-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.75rem;
  }

  .sc-label {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .sc-loc {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .scene-rule {
    border: none;
    border-top: 1px solid #1c1c1c;
    margin-bottom: 2rem;
  }

  /* ─── Lines ─── */
  .line {
    margin-bottom: 1.6rem;
  }

  .speaker {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--gold-dim);
    margin-bottom: 0.35rem;
  }

  .zh {
    font-size: 1.1rem;
    line-height: 1.75;
    color: #ccc8be;
    margin-bottom: 0.25rem;
  }

  .zh .term-highlight {
    color: var(--gold);
    text-decoration: underline;
    text-decoration-color: var(--gold-dim);
    text-underline-offset: 3px;
    cursor: default;
  }

  .en {
    font-size: 0.84rem;
    line-height: 1.65;
    color: #585248;
    font-style: italic;
  }

  /* ─── Annotated line ─── */
  .line.annotated {
    border-left: 2px solid var(--gold-dim);
    padding: 0.9rem 1.2rem;
    background: #121008;
    border-radius: 0 3px 3px 0;
    margin-left: -1.4rem;
  }

  .line.annotated .zh { color: #ddd8cc; }

  .annotation-toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.7rem;
    background: none;
    border: 1px solid var(--gold-dim);
    border-radius: 3px;
    color: var(--gold);
    font-size: 0.68rem;
    padding: 0.15rem 0.6rem;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s;
  }
  .annotation-toggle:hover { background: #1a1710; border-color: var(--gold); }
  .annotation-toggle.showing { background: #1a1710; border-color: var(--gold); color: var(--gold-light); }

  /* ─── Notes panel ─── */
  .notes-panel {
    width: 310px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .notes-panel-inner {
    height: 100%;
    overflow-y: auto;
    padding: 1.5rem 1.8rem;
    position: relative;
    z-index: 1;
  }

  .notes-panel-inner::-webkit-scrollbar { display: none; }

  .notes-panel-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #252525;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }

  .notes-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.6rem;
  }

  .notes-tag {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .notes-count {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .notes-rule {
    border: none;
    border-top: 1px solid #1c1c1c;
    margin-bottom: 1.2rem;
  }

  .notes-scene-ref {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.9rem;
  }

  .notes-headline {
    font-size: 1.15rem;
    color: var(--gold);
    font-style: italic;
    line-height: 1.35;
    margin-bottom: 1.3rem;
    letter-spacing: 0.01em;
  }

  .notes-explanation p {
    font-size: 0.79rem;
    line-height: 1.8;
    color: #6a6358;
    margin-bottom: 0.9rem;
  }
  .notes-explanation p:last-child { margin-bottom: 0; }

  .notes-terms {
    margin-top: 1.3rem;
    padding-top: 1.1rem;
    border-top: 1px solid #1c1c1c;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .notes-term {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 0.6rem;
    align-items: start;
  }

  .nt-left { display: flex; flex-direction: column; gap: 0.15rem; }
  .nt-zh { font-size: 0.88rem; color: var(--gold); letter-spacing: 0.04em; }
  .nt-pinyin { font-size: 0.68rem; color: var(--gold-dim); font-style: italic; letter-spacing: 0.03em; }
  .nt-meaning { font-size: 0.72rem; color: #5a554a; line-height: 1.5; }

  .notes-watermark {
    position: absolute;
    bottom: 1.5rem;
    right: 1.8rem;
    font-size: 7rem;
    color: #161410;
    pointer-events: none;
    line-height: 1;
    user-select: none;
    font-weight: normal;
    z-index: 0;
  }

  /* ─── Scene card (in scroll mode) ─── */
  .scene-card {
    margin-bottom: 3.5rem;
  }
</style>
</head>
<body>

<div class="app">

  <!-- Top bar -->
  <header class="top-bar">
    <div class="top-left">
      <div class="chapter-tag" id="chapter-tag">章·Ch·I</div>
      <div class="top-year-loc" id="top-year-loc">—</div>
    </div>
    <div class="top-center">
      <h1 class="scene-title-zh" id="scene-title-zh">一代宗師</h1>
      <p class="scene-title-en" id="scene-title-en">The Grandmaster</p>
    </div>
    <div></div>
  </header>

  <div class="layout">

    <!-- Year nav -->
    <nav class="year-nav" id="year-nav"></nav>

    <!-- Reading area -->
    <main class="reading-area" id="reading-area">
      <div id="scenes-container"></div>
    </main>

    <!-- Notes panel -->
    <aside class="notes-panel" id="notes-panel">
      <div class="notes-panel-inner">
        <div class="notes-panel-empty" id="notes-empty">— 解 —</div>
        <div id="notes-content" style="display:none">
          <div class="notes-top">
            <span class="notes-tag">NOTE 解</span>
            <span class="notes-count" id="notes-count"></span>
          </div>
          <hr class="notes-rule">
          <div class="notes-scene-ref" id="notes-scene-ref"></div>
          <div class="notes-headline" id="notes-headline"></div>
          <div class="notes-explanation" id="notes-explanation"></div>
          <div class="notes-terms" id="notes-terms"></div>
        </div>
      </div>
      <div class="notes-watermark" id="notes-watermark"></div>
    </aside>

  </div>


</div>

<script>
fetch('script.json').then(r => r.json()).then(init);

function init(data) {
  const scenes = data.scenes.filter(s => s.scene > 0);

  // Global annotation index
  const allAnnotations = [];
  scenes.forEach((scene, si) => {
    scene.lines.forEach((line, li) => {
      if (line.annotation) {
        allAnnotations.push({ si, li, sceneNum: scene.scene, speaker: line.speaker, annotation: line.annotation });
      }
    });
  });

  const years = [...new Set(scenes.map(s => s.year).filter(Boolean))].sort((a, b) => a - b);

  function getChapter(year) {
    if (!year || year <= 1906) return 'I';
    if (year <= 1939) return 'II';
    if (year <= 1949) return 'III';
    return 'IV';
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function highlightTerms(zh, keyTerms) {
    if (!keyTerms || !keyTerms.length) return escHtml(zh);
    let result = escHtml(zh);
    keyTerms.forEach(t => {
      const safe = escHtml(t.zh);
      result = result.split(safe).join(
        `<span class="term-highlight" title="${escHtml(t.pinyin)}: ${escHtml(t.meaning)}">${safe}</span>`
      );
    });
    return result;
  }

  // ── Build year nav ──
  const yearNav = document.getElementById('year-nav');
  years.forEach((y, i) => {
    if (i > 0) {
      const rule = document.createElement('div');
      rule.className = 'year-nav-rule';
      yearNav.appendChild(rule);
    }
    const item = document.createElement('div');
    item.className = 'year-nav-item';
    const btn = document.createElement('button');
    btn.className = 'year-nav-btn';
    btn.dataset.year = y;
    btn.textContent = y;
    btn.addEventListener('click', () => {
      const card = document.querySelector(`.scene-card[data-year="${y}"]`);
      card?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    item.appendChild(btn);
    yearNav.appendChild(item);
  });

  // ── Render all scenes ──
  const container = document.getElementById('scenes-container');

  scenes.forEach((scene, si) => {
    const card = document.createElement('div');
    card.className = 'scene-card';
    card.dataset.scene = scene.scene;
    card.dataset.year = scene.year || '';

    const yearLoc = [scene.year, scene.location].filter(Boolean).join(' · ') || '—';

    const linesHtml = scene.lines.map((line, li) => {
      const hasAnn = !!line.annotation;
      const spk = line.speaker ? `<div class="speaker">${escHtml(line.speaker)}</div>` : '';
      const zhHtml = hasAnn ? highlightTerms(line.zh, line.annotation.key_terms) : escHtml(line.zh);

      if (hasAnn) {
        const annRef = allAnnotations.find(a => a.si === si && a.li === li);
        return `<div class="line annotated" data-ann-si="${si}" data-ann-li="${li}">
          ${spk}
          <div class="zh">${zhHtml}</div>
          <div class="en">${escHtml(line.en)}</div>
          <button class="annotation-toggle showing">解 <span style="font-size:0.6rem;letter-spacing:0.14em">SHOWING</span></button>
        </div>`;
      }
      return `<div class="line">${spk}<div class="zh">${zhHtml}</div><div class="en">${escHtml(line.en)}</div></div>`;
    }).join('');

    card.innerHTML = `
      <div class="scene-header">
        <span class="sc-label">SC ${scene.scene}</span>
        <span class="sc-loc">${escHtml(yearLoc)}</span>
      </div>
      <hr class="scene-rule">
      ${linesHtml}
    `;

    // Annotation toggle clicks
    card.querySelectorAll('.annotation-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const lineEl = btn.closest('.line.annotated');
        const si2 = parseInt(lineEl.dataset.annSi);
        const li2 = parseInt(lineEl.dataset.annLi);
        const annRef = allAnnotations.find(a => a.si === si2 && a.li === li2);
        if (annRef) showAnnotationInPanel(annRef);
      });
    });

    container.appendChild(card);
  });

  // ── Update top bar ──
  function updateTopBar(scene) {
    const chapter = getChapter(scene.year);
    const yearLoc = [scene.year, scene.location].filter(Boolean).join(' · ') || '—';
    const titleZh = scene.title_zh || scene.location || `SC ${scene.scene}`;
    const titleEn = scene.title_en || scene.notes || '';
    document.getElementById('chapter-tag').textContent = `章·Ch·${chapter}`;
    document.getElementById('top-year-loc').textContent = yearLoc;
    document.getElementById('scene-title-zh').textContent = titleZh;
    document.getElementById('scene-title-en').textContent = titleEn;
  }

  // ── Show annotation in panel ──
  function showAnnotationInPanel(annRef) {
    const ann = scenes[annRef.si].lines[annRef.li].annotation;
    document.getElementById('notes-empty').style.display = 'none';
    document.getElementById('notes-content').style.display = '';

    const globalIdx = allAnnotations.indexOf(annRef);
    document.getElementById('notes-count').textContent = globalIdx >= 0
      ? `${String(globalIdx + 1).padStart(2, '0')} / ${String(allAnnotations.length).padStart(2, '0')}`
      : '';

    document.getElementById('notes-scene-ref').textContent =
      `SC ${annRef.sceneNum}${annRef.speaker ? ' · ' + annRef.speaker : ''}`;
    document.getElementById('notes-headline').textContent = ann.headline || '';

    const paras = (ann.explanation || '').split('\n\n').map(p => `<p>${escHtml(p)}</p>`).join('');
    document.getElementById('notes-explanation').innerHTML = paras;

    const terms = ann.key_terms || [];
    document.getElementById('notes-terms').innerHTML = terms.map(t => `
      <div class="notes-term">
        <div class="nt-left">
          <span class="nt-zh">${escHtml(t.zh)}</span>
          <span class="nt-pinyin">${escHtml(t.pinyin)}</span>
        </div>
        <span class="nt-meaning">${escHtml(t.meaning)}</span>
      </div>
    `).join('');

    document.getElementById('notes-watermark').textContent = terms.length > 0 ? terms[0].zh.slice(-1) : '';
  }

  // ── Scroll observer: update top bar, year nav, notes panel ──
  const readingArea = document.getElementById('reading-area');

  // IntersectionObserver for scene cards → update top bar + year nav
  const sceneObserver = new IntersectionObserver(entries => {
    // Pick the topmost visible scene card
    let topmost = null;
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        if (!topmost || entry.boundingClientRect.top < topmost.boundingClientRect.top) {
          topmost = entry;
        }
      }
    });
    if (topmost) {
      const sceneNum = parseInt(topmost.target.dataset.scene);
      const scene = scenes.find(s => s.scene === sceneNum);
      if (scene) {
        updateTopBar(scene);
        document.querySelectorAll('.year-nav-btn').forEach(btn => {
          btn.classList.toggle('active', scene.year && btn.dataset.year == scene.year);
        });
      }
    }
  }, { root: readingArea, threshold: 0.1 });

  document.querySelectorAll('.scene-card').forEach(card => sceneObserver.observe(card));

  // IntersectionObserver for annotated lines → update notes panel
  const annObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const si = parseInt(entry.target.dataset.annSi);
        const li = parseInt(entry.target.dataset.annLi);
        const annRef = allAnnotations.find(a => a.si === si && a.li === li);
        if (annRef) showAnnotationInPanel(annRef);
      }
    });
  }, { root: readingArea, threshold: 0.5 });

  document.querySelectorAll('.line.annotated').forEach(el => annObserver.observe(el));

  // ── Initial top bar state ──
  if (scenes.length > 0) updateTopBar(scenes[0]);
}
</script>
</body>
</html>
