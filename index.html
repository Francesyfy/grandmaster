<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一代宗師 / The Grandmaster — Script</title>
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc82;
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --muted: #6b6459;
    --border: #d4c9b0;
    --active-bg: #2a2520;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', 'Noto Serif SC', serif;
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
  }

  /* ─── Header ─── */
  header {
    text-align: center;
    padding: 3rem 1rem 2rem;
    border-bottom: 1px solid #333;
  }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    color: var(--gold);
    letter-spacing: 0.08em;
    font-weight: normal;
  }
  header .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 0.4rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ─── Layout ─── */
  .layout {
    display: flex;
    min-height: 100vh;
  }

  /* ─── Sidebar ─── */
  aside {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid #2d2d2d;
    padding: 1.5rem 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    background: #111;
  }

  aside h2 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    padding: 0 1.2rem 0.6rem;
  }

  .filter-section { margin-bottom: 1.5rem; }

  .filter-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.45rem 1.2rem;
    font-family: inherit;
    font-size: 0.82rem;
    color: #888;
    transition: color 0.15s, background 0.15s;
  }
  .filter-btn:hover { color: var(--gold-light); background: #1a1a1a; }
  .filter-btn.active { color: var(--gold); background: #1e1c18; }
  .filter-btn .tag {
    float: right;
    font-size: 0.7rem;
    color: #555;
    margin-top: 1px;
  }
  .filter-btn.active .tag { color: var(--gold); opacity: 0.7; }

  .divider {
    border: none;
    border-top: 1px solid #222;
    margin: 0.8rem 1.2rem;
  }

  /* Scene list in sidebar */
  .scene-list-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    padding: 0 1.2rem 0.5rem;
  }
  .scene-jump {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.3rem 1.2rem;
    font-family: inherit;
    font-size: 0.78rem;
    color: #666;
    transition: color 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scene-jump:hover { color: var(--gold-light); }
  .scene-jump.hidden { display: none; }

  /* ─── Main content ─── */
  main {
    flex: 1;
    padding: 2rem 3rem;
    max-width: 820px;
  }

  /* ─── Right year timeline ─── */
  #year-timeline {
    width: 100px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
    padding: 4rem 0;
  }

  .year-track {
    position: relative;
    height: 100%;
  }

  .year-track::before {
    content: '';
    position: absolute;
    left: 18px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #252525;
  }

  .year-marker {
    position: absolute;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 0.6rem;
    transform: translateY(-50%);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    text-align: left;
  }

  .year-marker .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #2e2e2e;
    flex-shrink: 0;
    transition: background 0.25s, transform 0.25s;
    position: relative;
    z-index: 1;
  }

  .year-marker .yr {
    font-size: 0.72rem;
    color: #3a3a3a;
    letter-spacing: 0.06em;
    transition: color 0.25s;
    white-space: nowrap;
  }

  .year-marker.active .dot {
    background: var(--gold);
    transform: scale(1.8);
  }

  .year-marker.active .yr {
    color: var(--gold);
    font-size: 0.78rem;
  }

  .year-marker:hover .yr { color: var(--gold-light); }
  .year-marker:hover .dot { background: #666; }
  .year-marker.active:hover .dot { background: var(--gold); }

  /* Results info */
  .results-info {
    font-size: 0.75rem;
    color: #555;
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }

  /* Scene card */
  .scene-card {
    margin-bottom: 2.5rem;
    border-left: 2px solid #2a2a2a;
    padding-left: 1.5rem;
    transition: border-color 0.2s;
  }
  .scene-card:hover { border-color: var(--gold); }
  .scene-card.hidden { display: none; }

  .scene-meta {
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
    margin-bottom: 0.8rem;
    flex-wrap: wrap;
  }
  .scene-num {
    font-size: 0.7rem;
    color: #444;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .location-badge {
    font-size: 0.72rem;
    padding: 0.15rem 0.55rem;
    border: 1px solid #333;
    border-radius: 3px;
    color: var(--muted);
  }
  .year-badge {
    font-size: 0.72rem;
    color: var(--gold);
    opacity: 0.7;
  }

  /* Lines */
  .line {
    margin-bottom: 1.2rem;
  }
  .speaker {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #555;
    margin-bottom: 0.25rem;
  }
  .zh {
    font-size: 1.05rem;
    line-height: 1.7;
    color: #ddd;
    margin-bottom: 0.2rem;
  }
  .en {
    font-size: 0.88rem;
    line-height: 1.6;
    color: #777;
    font-style: italic;
  }

  /* ─── Annotation ─── */
  .line.annotated { position: relative; }

  .annotation-toggle {
    display: inline-block;
    margin-top: 0.6rem;
    background: none;
    border: 1px solid #3a3228;
    border-radius: 3px;
    color: var(--gold);
    font-size: 0.72rem;
    padding: 0.1rem 0.5rem;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.05em;
    transition: background 0.15s, border-color 0.15s;
  }
  .annotation-toggle:hover { background: #1e1c18; border-color: var(--gold); }
  .annotation-toggle.open { background: #1e1c18; }

  .annotation-panel {
    margin-top: 1rem;
    padding: 1.2rem 1.4rem;
    background: #111;
    border-left: 2px solid var(--gold);
    border-radius: 0 4px 4px 0;
  }

  .annotation-headline {
    font-size: 0.9rem;
    color: var(--gold);
    margin-bottom: 1rem;
    letter-spacing: 0.04em;
  }

  .annotation-body p {
    font-size: 0.85rem;
    line-height: 1.75;
    color: #999;
    margin-bottom: 0.9rem;
  }
  .annotation-body p:last-child { margin-bottom: 0; }

  .key-terms {
    margin-top: 1.1rem;
    padding-top: 1rem;
    border-top: 1px solid #222;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .key-term {
    display: flex;
    gap: 0.7rem;
    align-items: baseline;
    font-size: 0.78rem;
  }
  .kt-zh { color: var(--gold-light); }
  .kt-pinyin { color: #555; font-style: italic; }
  .kt-meaning { color: #777; }

  /* Empty state */
  .empty {
    display: none;
    color: #444;
    font-size: 0.9rem;
    padding: 3rem 0;
    text-align: center;
  }
  .empty.visible { display: block; }

  /* ─── Responsive ─── */
  @media (max-width: 700px) {
    .layout { flex-direction: column; }
    aside {
      width: 100%;
      height: auto;
      position: static;
      border-right: none;
      border-bottom: 1px solid #2d2d2d;
      padding: 1rem 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0;
    }
    .filter-section { flex: 1; min-width: 140px; }
    .scene-list-section { display: none; }
    main { padding: 1.5rem 1.2rem; }
    #year-timeline { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>一代宗師 &nbsp;/&nbsp; THE GRANDMASTER</h1>
  <p class="subtitle">2013 &nbsp; 王家衛·梁朝偉·章子怡</p>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside id="sidebar">

    <!-- Location filter -->
    <div class="filter-section" id="loc-filter-section">
      <h2>Location &nbsp;地點</h2>
      <button class="filter-btn active" data-filter="loc" data-loc="all">All <span class="tag" id="loc-all-count"></span></button>
    </div>

    <hr class="divider">

    <!-- Character filter -->
    <div class="filter-section" id="spk-filter-section">
      <h2>Character &nbsp;人物</h2>
      <button class="filter-btn active" data-filter="spk" data-spk="all">All <span class="tag" id="spk-all-count"></span></button>
    </div>

    <hr class="divider">

    <!-- Scene jump list -->
    <div class="scene-list-section">
      <div class="scene-list-label">Scenes &nbsp;場景</div>
      <div id="scene-jump-list"></div>
    </div>

  </aside>

  <!-- Main -->
  <main>

    <div class="results-info" id="results-info"></div>

    <!-- Scene cards -->
    <div id="scenes-container"></div>
    <div class="empty" id="empty-state">No scenes match the current filter.</div>

  </main>

  <!-- Right year timeline -->
  <nav id="year-timeline"><div class="year-track" id="year-track"></div></nav>

</div>

<script>
fetch('script.json').then(r => r.json()).then(init);

function init(data) {
  const scenes = data.scenes;

  const LOC_ORDER = ['佛山', '东北', '香港', '未知'];

  function splitAmp(str) {
    return str ? str.split(/\s*&\s*/).map(s => s.trim()).filter(Boolean) : [];
  }

  // ── Enrich scenes with parsed locs/speakers ──
  scenes.forEach(s => {
    s._locs = s.location ? splitAmp(s.location) : ['未知'];
    s._speakers = [...new Set(s.lines.flatMap(l => splitAmp(l.speaker)))];
  });


  // ── Collect unique years, locations, speakers ──
  const years = [...new Set(scenes.map(s => s.year).filter(Boolean))].sort((a,b)=>a-b);
  const allLocs = [...new Set(scenes.flatMap(s => s._locs))];
  const locations = LOC_ORDER.filter(l => allLocs.includes(l));
  const speakers = [...new Set(scenes.flatMap(s => s._speakers))].sort();

  // ── Build right year timeline (proportional spacing) ──
  const yearTrack = document.getElementById('year-track');
  const minYear = years[0];
  const maxYear = years[years.length - 1];
  const yearRange = maxYear - minYear || 1;

  years.forEach(y => {
    const pct = (y - minYear) / yearRange * 100;
    const btn = document.createElement('button');
    btn.className = 'year-marker';
    btn.dataset.year = y;
    btn.style.top = `${pct}%`;
    btn.innerHTML = `<span class="dot"></span><span class="yr">${y}</span>`;
    btn.addEventListener('click', () => {
      const first = document.querySelector(`.scene-card[data-year="${y}"]:not(.hidden)`);
      first?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    yearTrack.appendChild(btn);
  });

  // ── Build location filter buttons ──
  const locSection = document.getElementById('loc-filter-section');
  locations.forEach(loc => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = 'loc';
    btn.dataset.loc = loc;
    btn.innerHTML = `${loc} <span class="tag"></span>`;
    locSection.appendChild(btn);
  });

  // ── Build speaker filter buttons ──
  const spkSection = document.getElementById('spk-filter-section');
  speakers.forEach(spk => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = 'spk';
    btn.dataset.spk = spk;
    btn.innerHTML = `${spk} <span class="tag"></span>`;
    spkSection.appendChild(btn);
  });

  // ── Build scene cards ──
  const container = document.getElementById('scenes-container');
  const jumpList = document.getElementById('scene-jump-list');

  scenes.forEach((scene, i) => {
    const num = i + 1;
    const card = document.createElement('div');
    card.className = 'scene-card';
    card.id = `scene-${num}`;
    card.dataset.year = scene.year || 'unknown';
    card.dataset.locs = scene._locs.join('|');
    card.dataset.speakers = scene._speakers.join('|');

    const yearText = scene.year ? `<span class="year-badge">${scene.year}</span>` : '';
    const locBadges = scene._locs.map(l => `<span class="location-badge">${l}</span>`).join('');
    const linesHtml = scene.lines.map(line => {
      const spk = line.speaker
        ? `<div class="speaker">${line.speaker}</div>`
        : '';
      if (line.annotation) {
        const ann = line.annotation;
        const terms = (ann.key_terms || []).map(t =>
          `<div class="key-term"><span class="kt-zh">${t.zh}</span><span class="kt-pinyin">${t.pinyin}</span><span class="kt-meaning">${t.meaning}</span></div>`
        ).join('');
        const termsBlock = terms ? `<div class="key-terms">${terms}</div>` : '';
        const paras = ann.explanation.split('\n\n').map(p => `<p>${p}</p>`).join('');
        return `<div class="line annotated">
          ${spk}<div class="zh">${line.zh}</div><div class="en">${line.en}</div>
          <button class="annotation-toggle" aria-expanded="false">解</button>
          <div class="annotation-panel" hidden>
            <div class="annotation-headline">${ann.headline}</div>
            <div class="annotation-body">${paras}</div>
            ${termsBlock}
          </div>
        </div>`;
      }
      return `<div class="line">${spk}<div class="zh">${line.zh}</div><div class="en">${line.en}</div></div>`;
    }).join('');

    card.innerHTML = `
      <div class="scene-meta">
        <span class="scene-num">Scene ${num}</span>
        ${locBadges}
        ${yearText}
      </div>
      ${linesHtml}
    `;

    card.querySelectorAll('.annotation-toggle').forEach(toggle => {
      const panel = toggle.nextElementSibling;
      toggle.addEventListener('click', () => {
        const open = panel.hidden;
        panel.hidden = !open;
        toggle.classList.toggle('open', open);
        toggle.setAttribute('aria-expanded', open);
      });
    });

    container.appendChild(card);

    const firstZh = scene.lines[0]?.zh?.slice(0, 18) || '…';
    const jump = document.createElement('button');
    jump.className = 'scene-jump';
    jump.dataset.scene = num;
    jump.textContent = `${num}. ${firstZh}`;
    jump.addEventListener('click', () => {
      document.getElementById(`scene-${num}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    jumpList.appendChild(jump);
  });

  // ── Filter state ──
  let activeLoc = 'all';
  let activeSpk = 'all';

  function sceneMatchesFilters(scene, card) {
    const locMatch = activeLoc === 'all' || card.dataset.locs.split('|').includes(activeLoc);
    const spkMatch = activeSpk === 'all' || card.dataset.speakers.split('|').includes(activeSpk);
    return locMatch && spkMatch;
  }

  function applyFilters() {
    const cards = document.querySelectorAll('.scene-card');
    const jumps = document.querySelectorAll('.scene-jump');
    let visible = 0;

    cards.forEach((card, i) => {
      const show = sceneMatchesFilters(scenes[i], card);
      card.classList.toggle('hidden', !show);
      if (jumps[i]) jumps[i].classList.toggle('hidden', !show);
      if (show) visible++;
    });

    document.getElementById('results-info').textContent =
      `${visible} of ${scenes.length} scenes`;
    document.getElementById('empty-state').classList.toggle('visible', visible === 0);

    // Update location counts
    document.querySelectorAll('#loc-filter-section .filter-btn').forEach(btn => {
      const loc = btn.dataset.loc;
      const tagEl = btn.querySelector('.tag');
      if (!tagEl) return;
      tagEl.textContent = scenes.filter(s => {
        const spkOk = activeSpk === 'all' || s._speakers.includes(activeSpk);
        const locOk = loc === 'all' ? true : s._locs.includes(loc);
        return spkOk && locOk;
      }).length;
    });

    // Update speaker counts
    document.querySelectorAll('#spk-filter-section .filter-btn').forEach(btn => {
      const spk = btn.dataset.spk;
      const tagEl = btn.querySelector('.tag');
      if (!tagEl) return;
      tagEl.textContent = scenes.filter(s => {
        const locOk = activeLoc === 'all' || s._locs.includes(activeLoc);
        const spkOk = spk === 'all' ? true : s._speakers.includes(spk);
        return locOk && spkOk;
      }).length;
    });
  }

  // ── Location filter clicks ──
  document.getElementById('loc-filter-section').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeLoc = btn.dataset.loc;
    document.querySelectorAll('#loc-filter-section .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    applyFilters();
  });

  // ── Speaker filter clicks ──
  document.getElementById('spk-filter-section').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeSpk = btn.dataset.spk;
    document.querySelectorAll('#spk-filter-section .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    applyFilters();
  });

  // ── Scroll-based year highlight ──
  let currentYear = null;

  function updateYearHighlight() {
    const threshold = window.innerHeight * 0.45;
    let found = null;
    for (const card of document.querySelectorAll('.scene-card:not(.hidden)')) {
      const top = card.getBoundingClientRect().top;
      if (top <= threshold) {
        const y = card.dataset.year;
        if (y && y !== 'unknown') found = y;
      } else {
        break;
      }
    }
    if (found && found !== currentYear) {
      currentYear = found;
      document.querySelectorAll('.year-marker').forEach(m => {
        m.classList.toggle('active', m.dataset.year == currentYear);
      });
    }
  }

  window.addEventListener('scroll', () => requestAnimationFrame(updateYearHighlight), { passive: true });

  // ── Initial render ──
  applyFilters();
  updateYearHighlight();
}
</script>
</body>
</html>
